name: Release Please

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing git tag to build and publish (for example v0.1.0)"
        required: true
        type: string

permissions:
  contents: write
  pull-requests: write

env:
  CARGO_TERM_COLOR: always

jobs:
  release-please:
    name: Release
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    outputs:
      releases_created: ${{ steps.release.outputs.releases_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - id: release
        uses: googleapis/release-please-action@v4

      - name: Mark release as draft
        if: steps.release.outputs.releases_created == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release edit "${{ steps.release.outputs.tag_name }}" --draft --repo "${{ github.repository }}"

  resolve-tag:
    name: Resolve Tag
    runs-on: ubuntu-latest
    needs: release-please
    if: >-
      always() && (
        (github.event_name == 'push' && needs.release-please.outputs.releases_created == 'true') ||
        github.event_name == 'workflow_dispatch'
      )
    outputs:
      tag: ${{ steps.resolve.outputs.tag }}
    steps:
      - id: resolve
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${{ needs.release-please.outputs.tag_name }}" >> "$GITHUB_OUTPUT"
          fi

  build:
    name: Build ${{ matrix.target }}
    needs: resolve-tag
    if: always() && needs.resolve-tag.result == 'success'
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            target: aarch64-apple-darwin
            asset: koban-aarch64-apple-darwin.tar.gz
          - os: macos-14
            target: x86_64-apple-darwin
            asset: koban-x86_64-apple-darwin.tar.gz
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            asset: koban-x86_64-unknown-linux-gnu.tar.gz
          - os: ubuntu-22.04-arm
            target: aarch64-unknown-linux-gnu
            asset: koban-aarch64-unknown-linux-gnu.tar.gz
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.resolve-tag.outputs.tag }}

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Add target
        run: rustup target add ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: release-${{ matrix.target }}
          cache-on-failure: true

      - name: Build
        run: cargo build --release --target ${{ matrix.target }} --locked

      - name: Strip binary
        run: |
          if [ "${{ runner.os }}" = "macOS" ]; then
            strip target/${{ matrix.target }}/release/koban
          else
            strip --strip-all target/${{ matrix.target }}/release/koban
          fi

      - name: Package
        run: tar -czf ${{ matrix.asset }} -C target/${{ matrix.target }}/release koban

      - uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.target }}
          path: ${{ matrix.asset }}

  publish-release:
    name: Publish GitHub release
    needs: [resolve-tag, build]
    if: always() && needs.build.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.resolve-tag.outputs.tag }}

      - uses: actions/download-artifact@v8
        with:
          path: artifacts
          merge-multiple: true

      - name: Generate checksums
        run: cd artifacts && sha256sum *.tar.gz > SHA256SUMS

      - name: Create or update release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.resolve-tag.outputs.tag }}
        run: |
          set -euo pipefail
          if gh release view "$TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release edit "$TAG" --draft --repo "$GITHUB_REPOSITORY"
          else
            gh release create "$TAG" --draft --title "$TAG" --generate-notes --repo "$GITHUB_REPOSITORY"
          fi
          gh release upload "$TAG" artifacts/*.tar.gz artifacts/SHA256SUMS --clobber --repo "$GITHUB_REPOSITORY"
          gh release edit "$TAG" --draft=false --repo "$GITHUB_REPOSITORY"

  publish-crate:
    name: Publish crate
    needs: [resolve-tag, publish-release]
    if: always() && needs.publish-release.result == 'success' && startsWith(needs.resolve-tag.outputs.tag, 'v')
    runs-on: ubuntu-latest
    env:
      CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.resolve-tag.outputs.tag }}

      - uses: dtolnay/rust-toolchain@stable

      - name: Publish crate
        run: cargo publish --locked
