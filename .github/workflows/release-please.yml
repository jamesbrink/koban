name: Release Please

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to build and publish, creating it from this ref if needed (for example v0.2.0)"
        required: true
        type: string

permissions:
  contents: write
  pull-requests: write

env:
  CARGO_TERM_COLOR: always

jobs:
  release-please:
    name: Release
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    outputs:
      # The koban-cli component owns the prefix-free `vX.Y.Z` tag that carries the
      # binary assets (install.sh and `koban update` depend on this tag scheme).
      releases_created: ${{ steps.release.outputs['crates/koban-cli--release_created'] }}
      tag_name: ${{ steps.release.outputs['crates/koban-cli--tag_name'] }}
    steps:
      - id: release
        uses: googleapis/release-please-action@v4

      - name: Mark release as draft
        if: steps.release.outputs['crates/koban-cli--release_created'] == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release edit "${{ steps.release.outputs['crates/koban-cli--tag_name'] }}" --draft --repo "${{ github.repository }}"

  resolve-tag:
    name: Resolve Tag
    runs-on: ubuntu-latest
    needs: release-please
    if: >-
      always() && (
        (github.event_name == 'push' && needs.release-please.outputs.releases_created == 'true') ||
        github.event_name == 'workflow_dispatch'
      )
    outputs:
      tag: ${{ steps.resolve.outputs.tag }}
    steps:
      - uses: actions/checkout@v6
        if: github.event_name == 'workflow_dispatch'
        with:
          fetch-depth: 0

      - id: resolve
        env:
          TAG_INPUT: ${{ inputs.tag }}
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="$TAG_INPUT"
            if ! printf '%s\n' "$TAG" | grep -Eq '^v[0-9]+\.[0-9]+\.[0-9]+$'; then
              echo "::error::Release tag must look like vX.Y.Z; got '$TAG'"
              exit 1
            fi

            if git rev-parse -q --verify "refs/tags/$TAG" >/dev/null; then
              echo "Using existing tag $TAG"
            else
              git config user.name "github-actions[bot]"
              git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
              git tag "$TAG" "$GITHUB_SHA"
              git push origin "refs/tags/$TAG"
              echo "Created tag $TAG at $GITHUB_SHA"
            fi
            echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${{ needs.release-please.outputs.tag_name }}" >> "$GITHUB_OUTPUT"
          fi

  build:
    name: Build ${{ matrix.target }}
    needs: resolve-tag
    if: always() && needs.resolve-tag.result == 'success'
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            target: aarch64-apple-darwin
            asset: koban-aarch64-apple-darwin.tar.gz
          - os: macos-14
            target: x86_64-apple-darwin
            asset: koban-x86_64-apple-darwin.tar.gz
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            asset: koban-x86_64-unknown-linux-gnu.tar.gz
          - os: ubuntu-22.04-arm
            target: aarch64-unknown-linux-gnu
            asset: koban-aarch64-unknown-linux-gnu.tar.gz
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.resolve-tag.outputs.tag }}

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Add target
        run: rustup target add ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: release-${{ matrix.target }}
          cache-on-failure: true

      - name: Build
        run: cargo build --release --target ${{ matrix.target }} --locked

      - name: Strip binary
        run: |
          if [ "${{ runner.os }}" = "macOS" ]; then
            strip target/${{ matrix.target }}/release/koban
          else
            strip --strip-all target/${{ matrix.target }}/release/koban
          fi

      - name: Package
        run: tar -czf ${{ matrix.asset }} -C target/${{ matrix.target }}/release koban

      - uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.target }}
          path: ${{ matrix.asset }}

  publish-release:
    name: Publish GitHub release
    needs: [resolve-tag, build]
    if: always() && needs.build.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.resolve-tag.outputs.tag }}

      - uses: actions/download-artifact@v8
        with:
          path: artifacts
          merge-multiple: true

      - name: Generate checksums
        run: cd artifacts && sha256sum *.tar.gz > SHA256SUMS

      - name: Create or update release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.resolve-tag.outputs.tag }}
        run: |
          set -euo pipefail
          if gh release view "$TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release edit "$TAG" --draft --repo "$GITHUB_REPOSITORY"
          else
            gh release create "$TAG" --draft --title "$TAG" --generate-notes --repo "$GITHUB_REPOSITORY"
          fi
          gh release upload "$TAG" artifacts/*.tar.gz artifacts/SHA256SUMS --clobber --repo "$GITHUB_REPOSITORY"
          gh release edit "$TAG" --draft=false --repo "$GITHUB_REPOSITORY"

  publish-crate:
    name: Publish crate
    needs: [resolve-tag, publish-release]
    if: always() && needs.publish-release.result == 'success' && startsWith(needs.resolve-tag.outputs.tag, 'v')
    runs-on: ubuntu-latest
    env:
      CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.resolve-tag.outputs.tag }}

      - uses: dtolnay/rust-toolchain@stable

      - name: Skip crate publish without registry token
        if: env.CARGO_REGISTRY_TOKEN == ''
        run: echo "CARGO_REGISTRY_TOKEN is not configured; skipping crates.io publish."

      - name: Publish crates
        if: env.CARGO_REGISTRY_TOKEN != ''
        # Publish the library first; koban-cli depends on it, so it must already
        # be available on crates.io before the CLI publish resolves.
        run: |
          set -euo pipefail

          package_version() {
            cargo metadata --no-deps --format-version 1 \
              | jq -r --arg package "$1" '.packages[] | select(.name == $package) | .version'
          }

          crate_is_published() {
            package="$1"
            version="$2"
            cargo search "$package" --limit 1 | grep -E "^${package} = \"${version}\"" >/dev/null 2>&1
          }

          publish_with_retry() {
            package="$1"
            version="$(package_version "$package")"

            for attempt in 1 2 3 4 5 6; do
              if crate_is_published "$package" "$version"; then
                echo "$package $version is already published; skipping."
                return 0
              fi

              if cargo publish --locked -p "$package"; then
                echo "Published $package $version."
                return 0
              fi

              if [ "$attempt" -eq 6 ]; then
                echo "::error::Failed to publish $package $version after $attempt attempts."
                return 1
              fi

              sleep_seconds=$((attempt * 20))
              echo "Publish for $package $version did not complete; refreshing crates.io index and retrying in ${sleep_seconds}s."
              cargo search koban --limit 1 >/dev/null 2>&1 || true
              sleep "$sleep_seconds"
            done
          }

          publish_with_retry koban
          publish_with_retry koban-cli
